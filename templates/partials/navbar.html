{% load static %}
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" id="navbar" x-data="{ scrolled: false }" @scroll.window="scrolled = window.scrollY > 50">
  <nav :class="scrolled ? 'glass shadow-luxury-sm py-3' : 'py-4 bg-transparent'" class="transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between">

        <!-- Logo -->
        <a href="/" class="flex items-center gap-2.5 group">
          <img src="{% static 'img/kawas-logo.png' %}" alt="KAWA'S Café" class="h-9 sm:h-10 w-auto transition-transform duration-300 group-hover:scale-105">
          <div>
            <div class="font-display text-lg sm:text-xl font-semibold text-espresso-800 dark:text-[#F5E6D3] leading-none">KAWA'S</div>
            <div class="text-[10px] sm:text-xs text-espresso-600 dark:text-gold tracking-widest uppercase">Café</div>
          </div>
        </a>

        <!-- Desktop Nav Links -->
        <div class="hidden md:flex items-center gap-1">
          <a href="/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Home</a>
          <a href="/menu/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Menu</a>
          <a href="/about/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Our Story</a>
          <a href="/gallery/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Gallery</a>
          <a href="/visit-us/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Visit Us</a>
          <a href="/contact/" class="nav-link px-4 py-2 rounded-btn text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 hover:text-espresso-900 dark:hover:text-gold transition-all duration-200">Contact</a>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-2">
          <!-- Dark Mode Toggle -->
          <button @click="darkMode = !darkMode" class="p-2 rounded-btn text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-all duration-200" aria-label="Toggle dark mode">
            <i x-show="!darkMode" data-lucide="moon" class="w-5 h-5"></i>
            <i x-show="darkMode" data-lucide="sun" class="w-5 h-5"></i>
          </button>

          <!-- Order Now CTA -->
          <a href="/menu/" class="hidden sm:inline-flex items-center gap-2 bg-espresso-800 hover:bg-espresso-900 text-[#F5E6D3] text-sm font-semibold px-5 py-2.5 rounded-btn transition-all duration-200 hover:shadow-luxury-sm hover:-translate-y-0.5">
            <i data-lucide="coffee" class="w-4 h-4"></i>
            Order Now
          </a>

          <!-- Mobile Menu Toggle -->
          <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-btn text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-all duration-200" aria-label="Open menu">
            <i x-show="!mobileMenuOpen" data-lucide="menu" class="w-5 h-5"></i>
            <i x-show="mobileMenuOpen" data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="md:hidden glass border-t border-espresso-100 dark:border-espresso-800 mt-3">
      <div class="px-4 py-4 space-y-1">
        <a href="/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">🏠 Home</a>
        <a href="/menu/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">☕ Menu</a>
        <a href="/about/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">📖 Our Story</a>
        <a href="/gallery/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">📸 Gallery</a>
        <a href="/visit-us/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">📍 Visit Us</a>
        <a href="/contact/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">✉️ Contact</a>
        <a href="/breakfast/" class="block px-4 py-3 rounded-card text-sm font-medium text-espresso-700 dark:text-[#F5E6D3] hover:bg-espresso-100 dark:hover:bg-espresso-800 transition-colors">🍳 Breakfast</a>
        <a href="https://wa.me/254119000999" target="_blank" class="block px-4 py-3 rounded-card text-sm font-semibold btn-wa text-white text-center mt-2 transition-opacity hover:opacity-90">
          💬 Order on WhatsApp
        </a>
      </div>
    </div>
  </nav>
</header>

<!-- Halal Trust Bar -->

    <a href="tel:+254119000999" class="flex items-center gap-1 hover:text-espresso-900 dark:hover:text-gold transition-colors">
      <i data-lucide="phone" class="w-3 h-3"></i>+254 119 000 999
    </a>
    <a href="https://wa.me/254119000999" target="_blank" class="flex items-center gap-1 hover:text-espresso-900 dark:hover:text-gold transition-colors">

</div>
